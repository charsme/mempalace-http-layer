services:
  mempalace:
    build:
      context: .
      args:
        MEMPALACE_VERSION: ${MEMPALACE_VERSION:-latest}
    container_name: mempalace
    restart: unless-stopped
    userns_mode: "host"
    user: "1000:1000"
    environment:
      - HOME=/mempalace
      - MEMPALACE_PALACE_PATH=/mempalace/palace
    volumes:
      - ./data:/mempalace:z
    expose:
      - "${MCP_PORT:-3000}"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mempalace.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.mempalace.entrypoints=websecure"
      - "traefik.http.routers.mempalace.tls.certresolver=letsencrypt"
      - "traefik.http.services.mempalace.loadbalancer.server.port=${MCP_PORT:-3000}"
      - "traefik.http.middlewares.mempalace-auth.basicauth.users=${MEMPALACE_AUTH}"
      - "traefik.http.middlewares.mempalace-auth.basicauth.removeheader=true"
      - "traefik.http.routers.mempalace.middlewares=mempalace-auth"

networks:
  traefik-public:
    external: true
